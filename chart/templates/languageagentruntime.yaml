apiVersion: langop.io/v1alpha1
kind: LanguageAgentRuntime
metadata:
  name: openclaw
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  image: {{ .Values.image.repository }}:{{ .Values.image.tag }}

  # Auto-generate the gateway auth token per agent and inject it as OPENCLAW_GATEWAY_TOKEN.
  credentials:
    - name: OPENCLAW_GATEWAY_TOKEN

  # Agents using this runtime sit behind the cluster OIDC proxy (when the cluster enables auth).
  auth:
    enabled: {{ .Values.auth.enabled }}

  ports:
    - name: gateway
      port: {{ .Values.port }}
      protocol: TCP
      expose: true

  workspace:
    size: {{ .Values.workspace.size }}
    mountPath: {{ .Values.workspace.mountPath }}

  deployment:
    # Override the default CMD to bind on all interfaces and start in the
    # cloned repo directory when AGENT_REPO_DIR is injected by the operator
    # (spec.repository feature). Falls back to /workspace when unset.
    command:
      - sh
      - -c
      - 'cd "${AGENT_REPO_DIR:-/workspace}" && exec node openclaw.mjs gateway --allow-unconfigured --bind lan'

    initContainers:
      - name: openclaw-adapter
        image: {{ .Values.adapter.image.repository }}:{{ .Values.adapter.image.tag }}
        {{- if .Values.adapter.image.pullPolicy }}
        imagePullPolicy: {{ .Values.adapter.image.pullPolicy }}
        {{- end }}
        # MODEL_ENDPOINT and LLM_MODEL are injected by the operator.
        # The adapter uses them to configure openclaw's provider settings.
        env:
          - name: OPENCLAW_STATE_DIR
            value: /workspace/.openclaw
        volumeMounts:
          - name: workspace
            mountPath: {{ .Values.workspace.mountPath }}

    env:
      - name: OPENCLAW_HOME
        value: /workspace   # openclaw uses $OPENCLAW_HOME/.openclaw as its state dir

    resources:
      {{- toYaml .Values.resources | nindent 6 }}
